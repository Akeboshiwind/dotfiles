# Minimal tmux config for Claude Code sessions
# Designed to run inside Ghostty — no keybinding conflicts

# No useful prefix — avoid clashing with Ghostty's C-a
set -g prefix None
unbind-key -a

# Shell
set -g default-command "/usr/bin/env fish"

# Terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g escape-time 10

# Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# Pass through extended keys (ensures Shift+Enter works)
set -g extended-keys on
set -as terminal-features ",xterm-256color:extkeys"
